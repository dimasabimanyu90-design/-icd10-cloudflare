name: Setup Cloudflare D1 Database

on:
  workflow_dispatch:  # jalankan manual dari GitHub Actions tab

jobs:
  setup-d1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Creating D1 database..."
          wrangler d1 create icd9-paths-db || echo "Database may already exist"

      - name: Run SQL migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Uploading ICD-9-CM data to D1..."
          wrangler d1 execute icd9-paths-db --file=icd9_paths.sql --remote
          echo "Done! $(wc -l < icd9_paths.sql) SQL statements executed"
